<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#030c08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Aircraft radar warning tool for film sound departments.">
<title>Aircraft Radar — Sound Dept</title>
<!-- v25: perfect circular radar grid with rectangular full-panel effects -->

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23030c08'/%3E%3Ccircle cx='50' cy='50' r='36' fill='none' stroke='%2300d97a' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='20' fill='none' stroke='%23d4a017' stroke-width='3' stroke-dasharray='5 5'/%3E%3Cpath d='M50 50 L80 32' stroke='%2300ff85' stroke-width='3'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Saira+Condensed:wght@500;700&display=swap" rel="stylesheet">

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#030c08;color:#b8ccc2;font-family:'JetBrains Mono',monospace;min-height:100%;overflow-x:hidden}
  body{min-height:100dvh;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
  button,input,select{font:inherit}
  button{cursor:pointer}
  .app{
    width:100vw;
    max-width:980px;
    min-height:100dvh;
    margin:0 auto;
    padding:max(6px,env(safe-area-inset-top)) 6px max(6px,env(safe-area-inset-bottom));
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .meta{display:none}

  .banner{
    border:1px solid #506070;border-radius:10px;padding:10px 12px;
    background:rgba(30,40,50,.28);
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:4px 12px;
    align-items:center;
    min-height:clamp(86px,12dvh,124px);
    animation:none!important;
    transition:none!important;
  }
  .banner.clear{border-color:#00d97a;background:rgba(0,60,30,.24)}
  .banner.warning{border-color:#ffb020;background:rgba(88,56,0,.28)}
  .banner.bad{border-color:#ff4040;background:rgba(92,10,10,.36)}
  .banner.no-count{grid-template-columns:1fr}
  .banner.no-count .headline{text-align:center;justify-self:center;width:100%}
  .banner.no-count .countBox{display:none}
  .headline{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(34px,8.8vw,66px);
    line-height:1;letter-spacing:.055em;margin:0;color:#90a0b0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    align-self:center;
  }
  .clear .headline{color:#00ff95;text-shadow:none}
  .warning .headline{color:#ffcc44;text-shadow:none}
  .bad .headline{color:#ff5858;text-shadow:none}
  .countBox{text-align:right;min-width:70px;display:flex;align-items:center;justify-content:flex-end;align-self:center}
  .bigCount{font-family:'Bebas Neue',sans-serif;font-size:clamp(54px,14vw,98px);line-height:1;letter-spacing:.03em;color:#e9f8ef}
  .clear .bigCount{color:#00ff95}.warning .bigCount{color:#ffcc44}.bad .bigCount{color:#ff5858}
  .countLabel{display:none}
  .statusLine{display:none}

  .radar-wrap{
    flex:1;min-height:280px;border:1px solid #0e2418;border-radius:12px;background:#020907;
    padding:4px;display:flex;align-items:center;justify-content:center;overflow:hidden
  }
  canvas{display:block;max-width:100%}

  .tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .tab{
    border:1px solid #1a3a2a;border-radius:5px;background:transparent;color:#90a898;padding:10px 4px;
    font-family:'Saira Condensed',sans-serif;font-weight:700;letter-spacing:.11em;text-transform:uppercase;font-size:clamp(10px,2.2vw,13px)
  }
  .tab.active{border-color:#d4a017;color:#f0d070;background:rgba(212,160,23,.08)}
  .tab:active{border-color:#d4a017;color:#d4a017}
  .panel{
    border:1px solid #0e2418;border-radius:10px;background:rgba(10,25,18,.78);padding:12px;
    max-height:46dvh;overflow:auto
  }
  .hidden{display:none!important}
  .title{
    font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.16em;
    text-transform:uppercase;color:#d4a017;margin-bottom:9px
  }
  .sblock{margin-bottom:14px}.sblock:last-child{margin-bottom:0}
  .slabel{display:flex;justify-content:space-between;align-items:baseline;color:#8aa0a0;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
  .slabel b{color:#d4a017}
  .select,.input{
    width:100%;background:#050e08;border:1px solid #1a3a2a;color:#dcebe4;padding:10px;border-radius:5px;font-size:12px
  }
  .input{flex:1;min-width:0}
  .select:focus,.input:focus{outline:none;border-color:#d4a017}
  .row{display:flex;gap:6px}
  .btn{
    border:1px solid #1a3a2a;border-radius:5px;background:transparent;color:#90a898;padding:9px 10px;
    font-family:'Saira Condensed',sans-serif;font-weight:700;letter-spacing:.11em;text-transform:uppercase;font-size:12px
  }
  .btn.primary{background:#d4a017;border-color:#d4a017;color:#06100a}
  .btn.green{border-color:#00d97a;color:#00ff95;background:rgba(0,217,122,.1)}
  .btn.red{border-color:#ff4040;color:#ff8080}
  .btn:disabled{opacity:.42}
  .chips{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .chip{text-align:left;background:#050e08;border:1px solid #1a3a2a;border-radius:6px;color:#9fb8a7;padding:8px;font-size:10px;line-height:1.22;min-height:44px}
  .chip.active{border-color:#d4a017;color:#f0d070;background:rgba(212,160,23,.13)}
  .chip small{display:block;color:#607868;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;font-size:8px}
  .custom-row{align-items:stretch}
  .manual-mic{border-top:1px solid rgba(26,58,42,.45);padding-top:10px}
  .lookup-note{font-size:10px;color:#607868;letter-spacing:.04em;line-height:1.4;margin-top:6px}
  .range-read{font-size:11px;color:#dcebe4;line-height:1.55}
  .range-read:empty{display:none}
  .range-read b{color:#f0c85a}
  .range-line{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid rgba(26,58,42,.45);padding:5px 0}
  .range-line:last-child{border-bottom:0}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:#d4a017}

  .or{display:flex;align-items:center;gap:8px;margin:10px 0 7px;color:#506860;font-size:9px;letter-spacing:.18em;text-transform:uppercase}
  .or:before,.or:after{content:"";height:1px;background:rgba(26,58,42,.65);flex:1}
  .msg{font-size:11px;line-height:1.45;color:#ff9060;margin-top:6px}
  .msg.ok{color:#90c8a0}
  .results{margin-top:7px;border:1px solid #1a3a2a;border-radius:5px;overflow:hidden}
  .result{display:block;width:100%;text-align:left;background:transparent;border:0;border-bottom:1px solid rgba(26,58,42,.55);color:#c8d8cc;padding:9px 10px}
  .result:last-child{border-bottom:0}
  .rmain{font-size:12px;color:#e8f0e8}.rsub{font-size:10px;color:#7a8f80;margin-top:2px}
  .cities{display:flex;flex-wrap:wrap;gap:6px}
  .city{padding:6px 10px;border:1px solid #1a3a2a;border-radius:3px;background:transparent;color:#90a898;font-size:11px}

  .err{color:#ffb0b0;border-color:#ff4040;background:rgba(60,10,10,.5);font-size:11px;line-height:1.45}
  .planeList{display:grid;gap:6px}
  .planeCard{border:1px solid #0e2418;border-left:3px solid #3a4850;border-radius:6px;background:rgba(10,20,15,.7);padding:9px 10px;font-size:11px}
  .planeCard.audible{border-left-color:#ff4040;background:rgba(50,10,10,.5)}
  .planeCard.approaching{border-left-color:#ffb020;background:rgba(40,25,0,.5)}
  .planeCard.clear{border-left-color:#00d97a}
  .planeHead{display:flex;justify-content:space-between;gap:8px;align-items:baseline;margin-bottom:5px}
  .callsign{font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:18px;color:#e0eae0}
  .pill{font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;padding:2px 8px;border-radius:3px;text-transform:uppercase;white-space:nowrap;background:#3a4850;color:#90a8b0}
  .audible .pill{background:#ff4040;color:white}.approaching .pill{background:#ffb020;color:#1a0e00}.clear .pill{background:#00d97a;color:#001810}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
  .grid div{display:flex;justify-content:space-between;gap:8px}
  .lbl{color:#607868}.val{color:#c8d8cc;font-weight:500}
  .empty{text-align:center;padding:18px;color:#405850;font-size:11px;letter-spacing:.1em;text-transform:uppercase}

  @media (max-width:520px){
    .app{padding-left:4px;padding-right:4px;gap:5px}
    .banner{padding:8px 10px}
    .headline{font-size:clamp(28px,8.2vw,42px)}
    .bigCount{font-size:clamp(52px,13vw,76px)}
    .chips{grid-template-columns:1fr}
    .tabs{gap:4px}
  }
  @media (max-height:740px){
    .banner{padding:7px 10px}
    .bigCount{font-size:clamp(46px,12vw,72px)}
    .radar-wrap{min-height:240px}
    .tab{padding:8px 3px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="meta"><span id="metaLoc">no location</span><span id="metaApi">—</span></div>

  <div id="banner" class="banner">
    <div id="headline" class="headline">NO DATA</div>
    <div class="countBox">
      <div id="bigCount" class="bigCount">—</div>
      <div id="countLabel" class="countLabel"></div>
    </div>
    <div class="statusLine">
      <span id="statusLeft">Set location</span>
      <span id="statusRight">—</span>
    </div>
  </div>

  <div id="err" class="panel err hidden"></div>

  <div class="radar-wrap"><canvas id="radar"></canvas></div>

  <div class="tabs">
    <button id="tabMics" class="tab">Mics</button>
    <button id="tabAircraft" class="tab">Aircraft</button>
    <button id="tabLocation" class="tab">Location</button>
  </div>

  <div id="micPanel" class="panel hidden">
    <div class="sblock">
      <div id="chipGrid" class="chips"></div>
    </div>
    <div class="sblock manual-mic">
      <div class="row custom-row">
        <input id="customMicName" class="input" placeholder="Mic model">
        <button id="customMicBtn" class="btn">Search</button>
      </div>
      <div id="customMicMsg" class="msg hidden"></div>
    </div>
    <div class="sblock range-read" id="rangeRead"></div>
  </div>

  <div id="aircraftPanel" class="panel hidden">
    <div class="title">Aircraft List</div>
    <div id="aircraftList" class="planeList"></div>
  </div>

  <div id="locationPanel" class="panel hidden">
    <div class="row"><input id="searchInput" class="input" placeholder="Address, city, postal code…"><button id="searchBtn" class="btn primary">Search</button></div>
    <div id="searchMsg" class="msg hidden"></div>
    <div id="results" class="results hidden"></div>
    <div class="or">or</div>
    <button id="gpsBtn" class="btn green" style="width:100%">Use Current Location</button>
    <div id="gpsMsg" class="msg hidden"></div>
  </div>
</div>

<script>
'use strict';

const D2R=Math.PI/180;
const KM_PER_LAT=111.32;
const NM_TO_KM=1.852;
const FT_PER_M=3.28084;
const SOUND_SPEED=343;
const REFRESH_MS=8000;
const SWEEP_SPEED=44;

const STORE_LOC='aircraftRadar.loc.v10';
const STORE_SETTINGS='aircraftRadar.settings.v14';
const STORE_UI='aircraftRadar.ui.v14';
const STORE_CUSTOM='aircraftRadar.customMics.v14';
const MIC_LOOKUP_ENDPOINT='';
const SAME_ORIGIN_MIC_DB='mic-specs.json';

const CITIES=[
  ['Toronto',43.6532,-79.3832],
  ['Vancouver',49.2827,-123.1207],
  ['Los Angeles',34.0522,-118.2437],
  ['Atlanta',33.749,-84.388],
  ['NYC',40.7128,-74.006],
  ['London',51.5074,-.1278],
  ['Vegas',36.1699,-115.1398],
  ['Albuquerque',35.0844,-106.6504]
];

const RING_COLORS=['#7fb7ff','#b9a7ff','#8bd3ff','#d5c7ff','#a7b8ff','#78a6c8','#c5d4e6','#9aa8bd'];

const MICS={
  mkh416:{name:'Sennheiser MKH 416',short:'MKH 416',kind:'boom shotgun',mic:13,hot:6.5,tail:35,ceil:12000},
  mkh8060:{name:'Sennheiser MKH 8060',short:'MKH 8060',kind:'boom shotgun',mic:14,hot:7,tail:38,ceil:13000},
  mkh50:{name:'Sennheiser MKH 50',short:'MKH 50',kind:'interior boom',mic:10,hot:5,tail:25,ceil:10000},
  cmit:{name:'Schoeps CMIT 5U',short:'CMIT 5U',kind:'boom shotgun',mic:15,hot:7.5,tail:40,ceil:14000},
  minicmit:{name:'Schoeps MiniCMIT',short:'MiniCMIT',kind:'boom shotgun',mic:14,hot:7,tail:38,ceil:13000},
  mk41:{name:'Schoeps CMC/MK 41',short:'MK 41',kind:'dialogue boom',mic:11,hot:5.5,tail:28,ceil:11000},
  dpa4017:{name:'DPA 4017',short:'DPA 4017',kind:'boom shotgun',mic:15,hot:7.5,tail:40,ceil:14000},
  dpa4018:{name:'DPA 4018',short:'DPA 4018',kind:'dialogue boom',mic:11,hot:5.5,tail:28,ceil:11000},
  cos11d:{name:'Sanken COS-11D',short:'COS-11D',kind:'lav',mic:18,hot:9,tail:50,ceil:15000},
  dpa4060:{name:'DPA 4060',short:'DPA 4060',kind:'lav',mic:20,hot:10,tail:55,ceil:16000},
  dpa6060:{name:'DPA 6060',short:'DPA 6060',kind:'lav',mic:19,hot:9.5,tail:52,ceil:16000},
  b6:{name:'Countryman B6',short:'B6',kind:'lav',mic:18,hot:9,tail:50,ceil:15000},
  mke2:{name:'Sennheiser MKE 2',short:'MKE 2',kind:'lav',mic:17,hot:8.5,tail:48,ceil:15000},
  twinplex:{name:'Shure TwinPlex TL47',short:'TwinPlex',kind:'lav',mic:19,hot:9.5,tail:52,ceil:16000,aliases:['TL47']}
};

const HUMAN_BASELINE={id:'human',name:'',short:'',kind:'baseline',mic:8,hot:4,tail:20,ceil:10000,color:'#8aa0b8',human:true};

const PACKAGES={
  none:{label:'No Mic Selected',mics:[]},
  boom_lav:{label:'Boom + Lav Dialogue',mics:['mkh416','cos11d']},
  exterior_quiet:{label:'Quiet Exterior Dialogue',mics:['cmit','dpa4060','cos11d']},
  lav_heavy:{label:'Lav Heavy / Wardrobe',mics:['cos11d','dpa4060','dpa6060','b6']},
  boom_only:{label:'Boom Only',mics:['mkh416','cmit']},
  interior:{label:'Interior / Controlled',mics:['mkh50','mk41']},
  custom:{label:'Specific Mic Override',mics:[]}
};

const ADSB=[
  {
    name:'adsb.lol',
    url:(lat,lon,nm)=>`https://api.adsb.lol/v2/lat/${lat}/lon/${lon}/dist/${nm}`,
    parse:d=>Array.isArray(d?.ac)?d.ac:[]
  },
  {
    name:'airplanes.live',
    url:(lat,lon,nm)=>`https://api.airplanes.live/v2/point/${lat}/${lon}/${nm}`,
    parse:d=>Array.isArray(d?.ac)?d.ac:[]
  },
  {
    name:'opensky',
    url:(lat,lon,nm)=>{
      const dl=nm*NM_TO_KM/KM_PER_LAT;
      const dn=nm*NM_TO_KM/(KM_PER_LAT*Math.cos(lat*D2R));
      return `https://opensky-network.org/api/states/all?lamin=${lat-dl}&lomin=${lon-dn}&lamax=${lat+dl}&lomax=${lon+dn}`;
    },
    parse:d=>Array.isArray(d?.states)
      ? d.states.map(s=>({
          hex:s[0],flight:s[1]||'',lat:s[6],lon:s[5],
          alt_baro:s[7]!=null?s[7]*FT_PER_M:null,
          gs:s[9]!=null?s[9]/.5144:0,
          track:s[10]||0,t:'?'
        })).filter(a=>a.lat!=null&&a.lon!=null)
      : []
  }
];

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const read=(k,d=null)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};
const write=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

const state={
  loc:null,
  savedLoc:null,
  activePanel:null,
  settings:{package:'none',active:[]},
  adsb:{state:'idle',source:null,preferred:null,lastFetch:null,planes:[],error:null},
  search:{loading:false,results:[]},
  analyzed:[],
  sweep:0,
  prevSweep:0,
  rafLast:null,
  timer:null
};

function fmt(t){
  if(t==null||!isFinite(t))return'—';
  t=Math.max(0,Math.round(t));
  if(t>=3600){
    const h=Math.floor(t/3600);
    const m=Math.floor((t%3600)/60);
    return `${h}h ${String(m).padStart(2,'0')}m`;
  }
  return `${Math.floor(t/60)}m ${String(t%60).padStart(2,'0')}s`;
}

function dir(d){
  return['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8];
}

function xy(lat,lon,olat,olon){
  return {x:(lon-olon)*KM_PER_LAT*Math.cos(olat*D2R), y:(lat-olat)*KM_PER_LAT};
}

function brg(lat1,lon1,lat2,lon2){
  const dL=(lon2-lon1)*D2R;
  const y=Math.sin(dL)*Math.cos(lat2*D2R);
  const x=Math.cos(lat1*D2R)*Math.sin(lat2*D2R)-Math.sin(lat1*D2R)*Math.cos(lat2*D2R)*Math.cos(dL);
  return (Math.atan2(y,x)/D2R+360)%360;
}

function micIds(){
  return (state.settings.active||[]).filter(id=>MICS[id]);
}

function packageIds(){
  return PACKAGES[state.settings.package]?.mics||[];
}

function activeMicIds(){
  return micIds();
}

function selectedMics(){
  const ids=activeMicIds();
  if(!ids.length)return [HUMAN_BASELINE];
  return ids.map((id,i)=>({id,...MICS[id],color:RING_COLORS[i%RING_COLORS.length]}));
}

function rangeSettings(){
  const mics=selectedMics();
  let mic=HUMAN_BASELINE.mic,hot=HUMAN_BASELINE.hot,tail=HUMAN_BASELINE.tail,ceil=HUMAN_BASELINE.ceil;
  mics.forEach(m=>{mic=Math.max(mic,m.mic);hot=Math.max(hot,m.hot);tail=Math.max(tail,m.tail);ceil=Math.max(ceil,m.ceil)});
  // Keep extra radar space so aircraft about 60 seconds before mic-range entry remain visible.
  const oneMinuteLeadKm=18;
  const radar=Math.max(12,Math.ceil(Math.max(mic*1.55,mic+oneMinuteLeadKm)/4)*4);
  return {mic,hot,tail,ceil,radar,mics,usingHuman:!activeMicIds().length};
}

function syncPackage(id){
  state.settings.package=id;
  if(id!=='custom')state.settings.active=[...PACKAGES[id].mics];
  write(STORE_SETTINGS,state.settings);
}

function saveCustomMics(){
  const custom={};
  Object.entries(MICS).forEach(([id,m])=>{if(id.startsWith('custom_'))custom[id]=m});
  write(STORE_CUSTOM,custom);
}

function normText(s){
  return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
}

function findMicMatch(query){
  const q=normText(query);
  if(!q)return null;
  return Object.entries(MICS).find(([id,m])=>{
    const n=normText(m.name);
    const sh=normText(m.short);
    const aliases=(m.aliases||[]).map(normText);
    return n.includes(q)||q.includes(n)||sh.includes(q)||q.includes(sh)||aliases.some(a=>a&&((a.includes(q)||q.includes(a))));
  })||null;
}

function normalizeMicRecord(raw, fallbackName){
  if(!raw||typeof raw!=='object')return null;
  const name=String(raw.name||fallbackName||'').trim();
  const mic=parseFloat(raw.mic ?? raw.rangeKm ?? raw.hearingRangeKm ?? raw.range);
  if(!name||!isFinite(mic)||mic<=0||mic>80)return null;
  return {
    name,
    short:String(raw.short||name).replace(/\s+/g,' ').slice(0,22),
    kind:String(raw.kind||'lookup'),
    mic:Math.round(mic*10)/10,
    hot:Math.round(parseFloat(raw.hot ?? raw.hotKm ?? mic*.5)*10)/10,
    tail:Math.round(parseFloat(raw.tail ?? raw.tailSeconds ?? Math.max(20,Math.min(75,mic*2.6)))),
    ceil:Math.round(parseFloat(raw.ceil ?? raw.altitudeCeilingFt ?? Math.max(8000,Math.min(18000,mic*850)))/500)*500,
    sensitivity:raw.sensitivity ?? raw.sensitivityMvPa ?? null,
    aliases:Array.isArray(raw.aliases)?raw.aliases:[]
  };
}

async function lookupFromSameOriginDatabase(query){
  try{
    const res=await fetch(SAME_ORIGIN_MIC_DB,{cache:'no-store'});
    if(!res.ok)return null;
    const data=await res.json();
    const list=Array.isArray(data)?data:Object.values(data||{});
    const q=normText(query);
    const raw=list.find(m=>{
      const n=normText(m.name);
      const sh=normText(m.short);
      const aliases=(m.aliases||[]).map(normText);
      return n.includes(q)||q.includes(n)||sh.includes(q)||q.includes(sh)||aliases.some(a=>a&&(a.includes(q)||q.includes(a)));
    });
    return normalizeMicRecord(raw,query);
  }catch{return null}
}

async function lookupFromEndpoint(query){
  if(!MIC_LOOKUP_ENDPOINT)return null;
  try{
    const res=await fetch(MIC_LOOKUP_ENDPOINT+'?model='+encodeURIComponent(query),{cache:'no-store'});
    if(!res.ok)return null;
    return normalizeMicRecord(await res.json(),query);
  }catch{return null}
}

async function lookupMicModel(query){
  const local=findMicMatch(query);
  if(local)return local;

  const sameOrigin=await lookupFromSameOriginDatabase(query);
  const endpoint= sameOrigin ? null : await lookupFromEndpoint(query);
  const record=sameOrigin||endpoint;
  if(!record)return null;

  const id='custom_'+normText(record.name).slice(0,28)+'_'+Date.now().toString(36);
  MICS[id]=record;
  saveCustomMics();
  return [id,record];
}

async function addManualMic(){
  const name=$('customMicName').value.trim();

function aircraftTypeFactor(t){
  t=String(t||'').toUpperCase();
  if(!t||t==='?')return 1;
  if(t.includes('A388'))return 1.8;
  if(t.includes('B748')||t.includes('B744'))return 1.65;
  if(/^B77|^B78|^A35|^A34|^A33/.test(t))return 1.45;
  if(/^B76|^B75|^A30|^A31/.test(t))return 1.3;
  if(/^B73|^A32|^A22|^E19|^E29|^BCS/.test(t))return 1.08;
  if(/^E17|^E75|^CRJ|^DH8|^AT[47]/.test(t))return .85;
  if(/^C1|^C2|^P28|^SR2|^BE|^PA/.test(t))return .65;
  if(/^H|^R44|^R66/.test(t))return .9;
  return 1;
}

function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

function planeNow(ac){
  const dt=state.adsb.lastFetch?(Date.now()-state.adsb.lastFetch)/1000:0;
  const gs=(ac.gs||0)*NM_TO_KM/3600;
  const tr=(ac.track||0)*D2R;
  const vx=gs*Math.sin(tr);
  const vy=gs*Math.cos(tr);
  let lat=ac.lat,lon=ac.lon;
  if(state.loc&&dt>0&&lat!=null&&lon!=null){
    lat+=vy*dt/KM_PER_LAT;
    lon+=vx*dt/(KM_PER_LAT*Math.cos(state.loc.lat*D2R));
  }
  return {...ac,lat,lon,vx,vy};
}

function analyze(ac){
  if(!state.loc||ac.lat==null||ac.lon==null)return null;
  const rs=rangeSettings();
  const altFt=typeof ac.alt_baro==='number'?ac.alt_baro:null;
  if(altFt==null||altFt<0)return null;

  const p=planeNow(ac);
  const pos=xy(p.lat,p.lon,state.loc.lat,state.loc.lon);
  const h=Math.hypot(pos.x,pos.y);
  const altKm=(altFt/FT_PER_M)/1000;
  const slant=Math.hypot(h,altKm);
  const tooHigh=altFt>rs.ceil||rs.mic<=altKm;

  let entry=null,exit=null,inMic=false;
  if(!tooHigh){
    const hT=Math.sqrt(Math.max(0,rs.mic*rs.mic-altKm*altKm));
    const v2=p.vx*p.vx+p.vy*p.vy;
    inMic=h<=hT;
    if(v2>1e-9){
      const b=2*(pos.x*p.vx+pos.y*p.vy);
      const c=h*h-hT*hT;
      const disc=b*b-4*v2*c;
      if(disc>=0){
        const sq=Math.sqrt(disc);
        const t1=(-b-sq)/(2*v2);
        const t2=(-b+sq)/(2*v2);
        if(t2>=0){entry=t1>0?t1:0;exit=t2+rs.tail}
      }
    }else if(inMic){entry=0;exit=rs.tail}
  }

  const status=tooHigh?'high':inMic?'audible':(entry!=null?'approaching':'clear');
  const typeFactor=aircraftTypeFactor(ac.t);
  const altFactor=clamp(1.25-(altFt/rs.ceil),.28,1.12);
  const distFactor=status==='audible'
    ? clamp(1.2-(h/rs.mic),.2,1.15)
    : status==='approaching'
      ? clamp(1-(Math.max(0,entry)/900),.15,.75)
      : .12;
  const risk=clamp(typeFactor*altFactor*distFactor, .1, 1.55);

  return {
    raw:ac,
    icao:ac.hex||Math.random().toString(36),
    callsign:(ac.flight||'').trim()||(ac.hex||'').toUpperCase(),
    type:ac.t||'?',
    altFt,gs:ac.gs||0,track:ac.track||0,
    x:pos.x,y:pos.y,vx:p.vx,vy:p.vy,h,slant,
    bearing:brg(state.loc.lat,state.loc.lon,p.lat,p.lon),
    soundDelay:slant*1000/SOUND_SPEED,
    entry,exit,status,tooHigh,typeFactor,risk
  };
}

function recompute(){
  state.analyzed=state.adsb.planes
    .map(analyze)
    .filter(Boolean)
    .sort((a,b)=>({audible:0,approaching:1,clear:2,high:3}[a.status]-{audible:0,approaching:1,clear:2,high:3}[b.status])||a.h-b.h);
}

function counts(){
  const audible=state.analyzed.filter(p=>p.status==='audible').length;
  const approaching=state.analyzed.filter(p=>p.status==='approaching').length;
  const tracked=state.analyzed.length;
  return {audible,approaching,tracked};
}

function resizeCanvas(){
  const c=$('radar');
  const wrap=c.parentElement;
  const dpr=window.devicePixelRatio||1;
  const vv=window.visualViewport?.height||window.innerHeight;
  const app=document.querySelector('.app');
  const nonRadar=[...app.children].filter(el=>el!==wrap&&!el.classList.contains('hidden'));
  const used=nonRadar.reduce((s,el)=>s+el.getBoundingClientRect().height,0)+(nonRadar.length+1)*6+16;
  const availH=Math.max(280,vv-used);
  const w=Math.floor(Math.max(280,wrap.clientWidth-8));
  const h=Math.floor(availH);
  c.width=Math.floor(w*dpr);
  c.height=Math.floor(h*dpr);
  c.style.width=w+'px';
  c.style.height=h+'px';
}

function drawRadar(){
  const c=$('radar');
  const dpr=window.devicePixelRatio||1;
  const ctx=c.getContext('2d');
  const W=c.width/dpr,H=c.height/dpr;
  const cx=W/2,cy=H/2;
  const pad=18;

  // Use one uniform scale so all radar rings stay true circles.
  // The radius is sized to the farthest panel corner, so the circular radar
  // continues past the visible rectangle and the whole rectangular panel remains active.
  const farR=Math.hypot(Math.max(cx,W-cx),Math.max(cy,H-cy))+18;
  const gridR=Math.max(120,farR-pad);
  const baseR=Math.min(W,H)/2-pad;
  const uiScale=clamp(baseR/420,.55,1.12);
  const rs=rangeSettings();
  const scale=gridR/rs.radar;

  ctx.clearRect(0,0,c.width,c.height);
  ctx.save();
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#020907';
  ctx.fillRect(0,0,W,H);

  // Full-panel atmospheric glow.
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,gridR);
  bg.addColorStop(0,'#061510');
  bg.addColorStop(.58,'#03100b');
  bg.addColorStop(1,'#020907');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // Full-panel circular radar grid. Circles remain round and are cropped by the rectangle.
  ctx.strokeStyle='rgba(0,100,60,.17)';
  ctx.lineWidth=.7;
  [.25,.5,.75,1].forEach(k=>{
    ctx.beginPath();
    ctx.arc(cx,cy,gridR*k,0,Math.PI*2);
    ctx.stroke();
  });
  ctx.beginPath();
  ctx.moveTo(cx,0);ctx.lineTo(cx,H);
  ctx.moveTo(0,cy);ctx.lineTo(W,cy);
  ctx.stroke();

  // Selected mic/hearing rings: always perfect circles.
  rs.mics
    .slice()
    .sort((a,b)=>b.mic-a.mic)
    .forEach((m,idx)=>{
      const rr=m.mic*scale;
      ctx.setLineDash([8,6]);
      ctx.strokeStyle=m.color;
      ctx.lineWidth=2.2;
      ctx.beginPath();
      ctx.arc(cx,cy,rr,0,Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      if(!rs.usingHuman && !m.human){
        const label=`${m.short}`;
        const angle=(-90+idx*18)*D2R;
        let lx=cx+Math.cos(angle)*rr;
        let ly=cy+Math.sin(angle)*rr;
        ctx.font=`bold ${Math.round(20*uiScale)}px 'Saira Condensed'`;
        ctx.textAlign='center';
        const tw=ctx.measureText(label).width+(10*uiScale);
        const bh=24*uiScale;
        lx=clamp(lx,tw/2+4,W-tw/2-4);
        ly=clamp(ly,bh*.75+4,H-bh*.25-4);
        ctx.fillStyle='rgba(0,12,8,.78)';
        ctx.fillRect(lx-tw/2,ly-bh*.55,tw,bh);
        ctx.fillStyle=m.color;
        ctx.fillText(label,lx,ly+6*uiScale);
      }
    });

  // Sweep fan reaches the farthest rectangle corner. The canvas clips it to the panel.
  const sr=(state.sweep-90)*D2R;
  for(let i=0;i<30;i++){
    const t=i/30;
    const a0=sr-(1-t+1/30)*1.1;
    const a1=sr-(1-t)*1.1;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,gridR,a0,a1);
    ctx.closePath();
    ctx.fillStyle=`rgba(0,255,110,${(1-t)*.055})`;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+gridR*Math.cos(sr),cy+gridR*Math.sin(sr));
  ctx.strokeStyle='rgba(0,255,100,.92)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // Cardinal labels sit against the rectangular panel edges.
  ctx.fillStyle='rgba(80,150,95,.6)';
  ctx.font=`bold ${Math.round(13*uiScale)}px 'Saira Condensed'`;
  ctx.textAlign='center';
  ctx.fillText('N',cx,pad);
  ctx.fillText('S',cx,H-pad+4*uiScale);
  ctx.fillText('E',W-pad,cy+4*uiScale);
  ctx.fillText('W',pad,cy+4*uiScale);

  state.analyzed.forEach(p=>{
    if(p.status==='high'&&p.h>rs.radar)return;
    const px=cx+p.x*scale;
    const py=cy-p.y*scale;
    const margin=80*uiScale;
    if(px < -margin || px > W + margin || py < -margin || py > H + margin)return;

    const col=p.status==='audible'?'#ff5050':p.status==='approaching'?'#ffd040':p.status==='clear'?'#00ff8a':'#607070';

    if(p.entry!=null&&p.exit!=null){
      ctx.beginPath();
      ctx.moveTo(px,py);
      ctx.lineTo(cx+(p.x+p.vx*120)*scale,cy-(p.y+p.vy*120)*scale);
      ctx.strokeStyle=p.status==='audible'?'rgba(255,80,80,.35)':'rgba(255,210,60,.3)';
      ctx.setLineDash([4,6]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    const size=clamp((9+p.risk*8)*uiScale,5,22*uiScale);
    ctx.save();
    ctx.translate(px,py);
    ctx.rotate(p.track*D2R);
    ctx.beginPath();
    ctx.moveTo(0,-size);
    ctx.lineTo(size*.58,size*.78);
    ctx.lineTo(0,size*.35);
    ctx.lineTo(-size*.58,size*.78);
    ctx.closePath();
    ctx.fillStyle=col;
    ctx.shadowColor=col;
    ctx.shadowBlur=p.status==='audible'?12:6;
    ctx.globalAlpha=p.status==='high'?0.55:1;
    ctx.fill();
    ctx.restore();

    let tag='';
    if(p.status==='audible'&&p.exit!=null)tag='-'+fmt(p.exit);
    else if(p.entry!=null)tag='+'+fmt(p.entry);

    if(tag){
      const tagFont=Math.round(16*uiScale);
      const tagPad=5*uiScale;
      const tagH=24*uiScale;
      ctx.font=`bold ${tagFont}px 'JetBrains Mono'`;
      ctx.textAlign='left';
      const w=ctx.measureText(tag).width+tagPad*2;
      let x=px+size*.7;
      let y=py-size-(16*uiScale);
      x=clamp(x,4,W-w-4);
      y=clamp(y,4,H-tagH-4);
      ctx.fillStyle='rgba(0,0,0,.78)';
      ctx.fillRect(x,y,w,tagH);
      ctx.strokeStyle=col;
      ctx.strokeRect(x,y,w,tagH);
      ctx.fillStyle=col;
      ctx.fillText(tag,x+tagPad,y+tagH*.7);
    }
  });

  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle='#d4a017';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,11,0,Math.PI*2);ctx.strokeStyle='rgba(212,160,23,.35)';ctx.stroke();

  ctx.restore();
}

async function geocode(q){
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),10000);
  try{
    const res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=6&addressdetails=1',{signal:ctrl.signal,headers:{'Accept-Language':'en'}});
    clearTimeout(to);
    if(!res.ok)throw Error(res.status);
    const data=await res.json();
    return data.map(r=>{
      const a=r.address||{};
      const place=a.house_number&&a.road?a.house_number+' '+a.road:a.road||a.neighbourhood||a.suburb||a.city||a.town||a.village||a.county||'Location';
      const region=a.city||a.town||a.village||a.county||'';
      const country=a.country_code?a.country_code.toUpperCase():'';
      return {lat:+r.lat,lon:+r.lon,shortLabel:[place,region!==place?region:null,country].filter(Boolean).join(', '),fullLabel:r.display_name,source:'search'};
    });
  }catch(e){
    clearTimeout(to);
    throw e;
  }
}

async function doSearch(){
  const q=$('searchInput').value.trim();
  if(!q)return;
  state.search.loading=true;
  $('searchBtn').disabled=true;
  $('searchMsg').classList.add('hidden');
  try{
    state.search.results=await geocode(q);
    if(!state.search.results.length){
      $('searchMsg').textContent='No matches found.';
      $('searchMsg').classList.remove('hidden');
    }
  }catch(e){
    $('searchMsg').textContent='Search failed.';
    $('searchMsg').classList.remove('hidden');
  }finally{
    state.search.loading=false;
    $('searchBtn').disabled=false;
    renderPanels();
  }
}

function setLoc(loc){

  state.savedLoc=loc;

function gps(auto=false){
  if(!navigator.geolocation){
    $('gpsMsg').textContent='GPS not supported.';
    $('gpsMsg').classList.remove('hidden');
    return;
  }
  $('gpsBtn').disabled=true;
  $('gpsMsg').textContent=auto?'Requesting location…':'Getting location…';
  $('gpsMsg').className='msg ok';
  $('gpsMsg').classList.remove('hidden');

  navigator.geolocation.getCurrentPosition(
    p=>{
      setLoc({
        lat:p.coords.latitude,
        lon:p.coords.longitude,
        shortLabel:'Phone GPS',
        fullLabel:'Phone GPS',
        accuracy:p.coords.accuracy,
        source:'gps'
      });
      $('gpsBtn').disabled=false;
    },
    e=>{
      let msg=e.code===1?'GPS permission denied. Enable location for this browser.':'GPS failed.';
      $('gpsMsg').textContent=msg;
      $('gpsMsg').className='msg';
      $('gpsBtn').disabled=false;
      if(auto)state.activePanel='location';
      renderPanels();
    },
    {enableHighAccuracy:true,timeout:20000,maximumAge:60000}
  );
}

function maybeAutoGps(){
  if(!navigator.geolocation)return;
  gps(true);
}

function manual(){
  const lat=parseFloat($('latInput').value);
  const lon=parseFloat($('lonInput').value);
  if(!isFinite(lat)||!isFinite(lon)||Math.abs(lat)>90||Math.abs(lon)>180)return;
  setLoc({lat,lon,shortLabel:'Manual Location',fullLabel:`${lat}, ${lon}`,source:'manual'});
}

async function fetchFeed(){
  if(!state.loc)return;
  state.adsb.state='loading';
  renderMeta();
  const rs=rangeSettings();
  const nm=Math.max(25,Math.ceil(rs.radar*1.85/NM_TO_KM));
  const sources=state.adsb.preferred?[...ADSB].sort((a,b)=>(a.name===state.adsb.preferred?-1:0)-(b.name===state.adsb.preferred?-1:0)):ADSB;
  const errs=[];
  for(const src of sources){
    try{
      const ctrl=new AbortController();
      const to=setTimeout(()=>ctrl.abort(),12000);
      const res=await fetch(src.url(state.loc.lat,state.loc.lon,nm),{signal:ctrl.signal});
      clearTimeout(to);
      if(!res.ok)throw Error(res.status);
      const data=await res.json();
      state.adsb={...state.adsb,state:'ok',source:src.name,preferred:src.name,lastFetch:Date.now(),planes:src.parse(data),error:null};
      render();
      return;
    }catch(e){
      errs.push(src.name+':'+(e.name==='AbortError'?'timeout':e.message||'failed'));
    }
  }
  state.adsb.state='error';
  state.adsb.error=errs.join(' · ');
  render();
}

function startLoop(){
  if(state.timer)clearInterval(state.timer);
  fetchFeed();
  state.timer=setInterval(fetchFeed,REFRESH_MS);
}

function anim(ts){
  if(!state.rafLast)state.rafLast=ts;
  const dt=Math.min((ts-state.rafLast)/1000,.1);
  state.rafLast=ts;
  state.prevSweep=state.sweep;
  state.sweep=(state.sweep+SWEEP_SPEED*dt)%360;
  if(Math.floor(ts/1000)!==Math.floor((ts-dt*1000)/1000)){
    recompute();
    renderMeta();
    renderBanner();
    if(state.activePanel==='aircraft')renderAircraftList();
  }
  drawRadar();
  requestAnimationFrame(anim);
}

function setPanel(name){
  state.activePanel=state.activePanel===name?null:name;
  write(STORE_UI,{activePanel:state.activePanel});
  render();
}


function removeDeprecatedMics(){
  const banned=['atr1100','audio-technica atr1100x','atr1100x','audio technica atr1100x'];
  const bannedNorm=banned.map(normText);
  Object.keys(MICS).forEach(id=>{
    const m=MICS[id]||{};
    const values=[id,m.name,m.short,...(m.aliases||[])].map(normText);
    if(values.some(v=>bannedNorm.includes(v)||v.includes('audiotechnicaatr1100'))){
      delete MICS[id];
    }
  });
  const active=(state.settings.active||[]).filter(id=>MICS[id]);
  if(active.length!==(state.settings.active||[]).length){
    state.settings.active=active;
    write(STORE_SETTINGS,state.settings);
  }
  saveCustomMics();
}

function init(){
  state.savedLoc=read(STORE_LOC,null);
  const custom=read(STORE_CUSTOM,{});
  if(custom&&typeof custom==='object')Object.assign(MICS,custom);
  removeDeprecatedMics();
  const ss=read(STORE_SETTINGS,null);
  if(ss)state.settings={...state.settings,...ss};
  const ui=read(STORE_UI,null);
  if(ui)state.activePanel=ui.activePanel||null;

  $('tabMics').onclick=()=>setPanel('mics');
  $('tabAircraft').onclick=()=>setPanel('aircraft');
  $('tabLocation').onclick=()=>setPanel('location');
  $('searchBtn').onclick=doSearch;
  $('searchInput').onkeydown=e=>{if(e.key==='Enter')doSearch()};
  $('results').onclick=e=>{
    const b=e.target.closest('.result');
    if(b)setLoc(state.search.results[+b.dataset.i]);
  };
  $('gpsBtn').onclick=()=>gps(false);
  $('customMicBtn').onclick=addManualMic;
  $('customMicName').onkeydown=e=>{if(e.key==='Enter')addManualMic()};

  $('chipGrid').onclick=e=>{
    const b=e.target.closest('.chip');
    if(!b)return;
    const id=b.dataset.mic;
    const active=new Set(activeMicIds());
    active.has(id)?active.delete(id):active.add(id);
    state.settings.package='custom';
    state.settings.active=[...active];
    write(STORE_SETTINGS,state.settings);
    render();
    if(state.loc)fetchFeed();
  };

  window.addEventListener('resize',resizeCanvas);
  window.visualViewport?.addEventListener('resize',resizeCanvas);

  const q=new URLSearchParams(location.search);
  const lat=parseFloat(q.get('lat'));
  const lon=parseFloat(q.get('lon'));
  if(isFinite(lat)&&isFinite(lon)){
    state.loc={lat,lon,shortLabel:q.get('label')||'URL Location',fullLabel:'URL coordinates',source:'url'};
  }else if(state.savedLoc){
    state.loc=state.savedLoc;
  }

  render();
  if(state.loc)startLoop();
  maybeAutoGps();
  requestAnimationFrame(anim);
}

document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
</script>
</body>
</html>
